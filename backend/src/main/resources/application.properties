spring.application.name=SmartCampusBackend

# MongoDB: default local database. Override for Atlas or another host without editing this file:
#   export SPRING_DATA_MONGODB_URI="mongodb+srv://USER:PASS@cluster.mongodb.net/smartcampus?retryWrites=true&w=majority"
# See docs/MONGODB_SETUP.md
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smartcampus}

# JWT (HS256) — use a long random secret in production; min 32 chars
app.jwt.secret=${JWT_SECRET:DevOnlySecretKeyMustBe32CharsLong!!}
app.jwt.expiration-ms=86400000
# SPA receives token in OAuth redirect; must match Vite origin
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
# Role policy bootstrap (local profile DataSeeder): reset all users to USER, then promote emails below.
app.auth.reset-roles-on-startup=true
app.auth.admin-emails=admin.itpm@gmail.com

# Local profile only: if true, deletes all documents in the bookings collection on startup (BookingDevCleanupRunner).
# Default false — enable only on a throwaway database.
app.dev.clear-bookings-on-startup=false

# Google OAuth — replace placeholders with real credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.provider=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
